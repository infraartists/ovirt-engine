name: ansible-lint

on:
  push:
    branches: [master,dev, ovirt-engine-4.5*]
    paths:
      - 'packaging/ansible-runner-service-project/**'
      - '.ansible-lint'
      - '.github/workflows/ansible-lint.yml'
  pull_request:
    branches: [master,dev, ovirt-engine-4.5*]
    paths:
      - 'packaging/ansible-runner-service-project/**'
      - '.ansible-lint'
      - '.github/workflows/ansible-lint.yml'
  workflow_dispatch:

jobs:
  ansible-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ansible-lint and required collections
        run: |
          python -m pip install --upgrade pip
          pip install 'ansible-lint==26.4.0'
          ansible-galaxy collection install ansible.posix

      - name: Show ansible-lint version
        run: ansible-lint --version

      - name: Run ansible-lint
        run: ansible-lint packaging/ansible-runner-service-project/
        continue-on-error: false
